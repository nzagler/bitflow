services:
  bitflow:
    build: .
    container_name: bitflow
    restart: unless-stopped
    ports:
      - "${BITFLOW_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATA_DIR: /data
      DATABASE_PATH: /data/bitflow.db
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-change-this-key}
    volumes:
      - ${BITFLOW_DATA_PATH:-./data}:/data
